<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Hostel Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            display: flex; 
            align-items: center; 
            height: 100vh; 
            flex-direction: column; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif;
        }
        .card { 
            background-color: #1e1e1e; 
            border: 1px solid #333; 
            width: 400px; 
            border-radius: 12px;
        }
        /* Fixed: Added the text-purple class for your branding */
        .text-purple { color: #bb86fc !important; }
        
        .btn-primary { 
            background-color: #bb86fc; 
            border: none; 
            color: black; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-primary:hover { background-color: #9965f4; color: white; }
        
        .form-control { 
            background-color: #2c2c2c !important; 
            color: white !important; 
            border: 1px solid #444; 
        }
        .form-control:focus { 
            border-color: #bb86fc; 
            box-shadow: none; 
        }
        .form-control::placeholder { color: #666; }
        
        .alert-container { width: 400px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="alert-container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center py-2 small border-0">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="card p-4 shadow-lg">
        <h3 class="text-center mb-4">
            <span class="text-purple">Hostel Analyzer Login</span> 
        </h3>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label text-muted small">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="admin@hostel.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2">Sign In</button>
        </form>
    </div>

    <p class="text-muted small mt-4">Authorized Personnel Only</p>
</body>
</html>
