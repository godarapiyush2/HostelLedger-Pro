<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | Smart Hostel Finance</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .stat-card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .chart-container { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .text-success { color: #00f2ad !important; }
        .text-danger { color: #ff5e5e !important; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Financial Overview</h2>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="stat-card">
                    <p class="text-muted mb-1">Total Income</p>
                    <h3 class="text-success">₹{{ income }}</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <p class="text-muted mb-1">Total Expenses</p>
                    <h3 class="text-danger">₹{{ expense }}</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <p class="text-muted mb-1">Net Profit/Loss</p>
                    <h3 class="{% if profit >= 0 %}text-success{% else %}text-danger{% endif %}">₹{{ profit }}</h3>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="chart-container">
                    <h5>Monthly Income vs Expense</h5>
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="chart-container">
                    <h5>Expense Breakdown</h5>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Line Chart: Income vs Expense Trend
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Income',
                    data: [12000, 19000, 15000, 22000, 18000, {{ income }}],
                    borderColor: '#00f2ad',
                    backgroundColor: 'rgba(0, 242, 173, 0.1)',
                    fill: true,
                    tension: 0.3
                }, {
                    label: 'Expense',
                    data: [8000, 12000, 11000, 15000, 13000, {{ expense }}],
                    borderColor: '#ff5e5e',
                    backgroundColor: 'rgba(255, 94, 94, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { 
                plugins: { legend: { labels: { color: 'white' } } }, 
                scales: { 
                    y: { ticks: { color: 'white' }, grid: { color: '#333' } }, 
                    x: { ticks: { color: 'white' }, grid: { color: '#333' } } 
                } 
            }
        });

        // Pie Chart: Real Category-wise Distribution
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: {{ labels|tojson }}, // Category names from Python
                datasets: [{
                    data: {{ values|tojson }}, // Sum of amounts from Python
                    backgroundColor: ['#7b2cbf', '#9d4edd', '#c8b6ff', '#e0aaff', '#3c096c'],
                    borderWidth: 1,
                    borderColor: '#1e1e1e'
                }]
            },
            options: { 
                plugins: { 
                    legend: { 
                        position: 'bottom', 
                        labels: { color: 'white', padding: 20 } 
                    } 
                } 
            }
        });
    </script>
</body>
</html>
